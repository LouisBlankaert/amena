name: Amena
options:
  bundleIdPrefix: com.louis
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: "J55DB3RJLY"

packages:
  FirebaseAnalytics:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

schemes:
  Amena:
    build:
      targets:
        Amena: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

targets:
  Amena:
    type: application
    platform: iOS
    bundleId: com.louis.Amena
    sources:
      - path: AmenaApp.swift
      - path: ContentView.swift
      - path: Secrets.swift
      - path: GoogleService-Info.plist
      - path: Extensions
      - path: Main
      - path: Models
      - path: Onboarding
      - path: Services
      - path: Assets.xcassets
      - path: Resources
    dependencies:
      - package: FirebaseAnalytics
        product: FirebaseAnalytics
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: targeted
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Info.plist
      properties:
        CFBundleName: Amena
        CFBundleDisplayName: Amena
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserNotificationsUsageDescription: "Amena needs notifications to remind you to pray and unlock your apps."
