name: Amena
options:
  bundleIdPrefix: com.louis
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Amena:
    type: application
    platform: iOS
    bundleId: com.louis.Amena
    sources:
      - path: Amena
    settings:
      base:
        INFOPLIST_FILE: Amena/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: targeted
    info:
      path: Amena/Info.plist
      properties:
        CFBundleName: Amena
        CFBundleDisplayName: Amena
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserNotificationsUsageDescription: "Amena needs notifications to remind you to pray and unlock your apps."
